<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>شجرة التحقيق السيبراني</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red:       #ff2233;
  --orange:    #f07524;
  --cyan:      #00eeff;
  --purple:    #d57bff;
  --yellow:    #ffdd00;
  --green:     #00ff88;
  --pink:      #ff7bb8;
  --blue:      #3498db;
  --grey:      #c8d0e0;
  --dark-grey: #50606e;
  --bg:        #040407;
  --panel:     rgba(7,9,15,0.97);
  --border:    rgba(255,34,51,0.30);
  --text:      #c8d0e0;
  --text-dim:  #50606e;
  --mono: 'Share Tech Mono', monospace;
  --arab: 'Cairo', sans-serif;
  --settings-w: 300px;
  --node-base-size: 33px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  font-family: var(--arab);
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  display: flex; flex-direction: column;
  cursor: default;
  touch-action: manipulation;
}

#bg-canvas {
  position: fixed; inset:0; z-index:0; pointer-events:none;
}

.scanline, .vignette {
  position: fixed; inset:0; z-index:1; pointer-events:none;
}
.scanline {
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
}
.vignette {
  background: radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,0.8) 100%);
}

header {
  position:relative; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px; background: rgba(4,4,7,0.98);
  border-bottom:1px solid var(--border); box-shadow:0 0 30px rgba(255,34,51,0.1);
  flex-shrink:0; gap:10px; min-height: 52px;
}
.header-left { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
.logo-hex {
  width:32px; height:32px; flex-shrink:0;
  background: rgba(255,34,51,0.1);
  border:1px solid rgba(255,34,51,0.5);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:0.58rem; color:var(--red);
  text-shadow:0 0 8px var(--red);
  animation:hexPulse 3s ease-in-out infinite;
}
@keyframes hexPulse{0%,100%{box-shadow:0 0 8px rgba(255,34,51,0.3)}50%{box-shadow:0 0 20px rgba(255,34,51,0.6)}}
.header-titles { display:flex; flex-direction:column; gap:1px; min-width:0; }
.header-title {
  font-family:var(--mono); font-size:0.85rem; color:var(--red);
  text-shadow:0 0 12px var(--red),0 0 24px rgba(255,34,51,0.4);
  letter-spacing:2px; animation:flicker 10s infinite;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
@keyframes flicker{0%,93%,95%,97%,100%{opacity:1}94%,96%{opacity:0.6}}
.header-sub { font-size:0.65rem; color: var(--text-dim); letter-spacing:1px; white-space:nowrap; }
.header-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.stat-chip { font-family:var(--mono); font-size:0.62rem; color:var(--green);
  text-shadow:0 0 6px var(--green);
  background:rgba(0,255,136,0.05); border:1px solid rgba(0,255,136,0.18);
  border-radius:3px; padding:3px 7px; white-space:nowrap;
  transition:all 0.3s;
}
.stat-chips-wrap { display:flex; gap:6px; align-items:center; }
.status-dot {
  width:6px; height:6px; border-radius:50%; flex-shrink:0;
  background:var(--green); box-shadow:0 0 8px var(--green);
  animation:blink 2s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}

/* إعدادات حجم أزرار قائمة الإعدادات */
.settings-toggle {
  width:36px; height:36px; flex-shrink:0;
  background:rgba(255,34,51,0.08);
  border:1px solid rgba(255,34,51,0.3);
  border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.2s;
  font-size:1.1rem; color:var(--red);
  position:relative;
}
.settings-toggle.small {width:26px; height:26px; font-size:0.78rem;}
.settings-toggle:hover,.settings-toggle.active{
  background:rgba(255,34,51,0.18);
  border-color:var(--red);
  box-shadow:0 0 14px rgba(255,34,51,0.4);
}
.settings-toggle .gear-icon { transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
.settings-toggle.active .gear-icon { transform:rotate(90deg); }
.settings-badge {
  position:absolute;top:-4px;right:-4px;
  width:8px;height:8px;border-radius:50%;
  background:var(--red);box-shadow:0 0 6px var(--red);
  animation:blink 1.5s step-end infinite;
  display:none;
}
.settings-badge.show { display:block; }

/* أزرار التحكم بالشاشة */
#screenControlButton, #screenOkButton, #screenCancelButton {
  position:fixed;
  left:50%; transform:translateX(-50%);
  z-index:45;
  font-family:var(--arab); font-size:1.15rem; font-weight:bold;
  padding:13px 30px; border-radius:8px; border:1px solid var(--red);
  background:rgba(0,0,0,0.61); color:var(--red);
  outline:none; cursor:pointer; bottom:40px;
  box-shadow:0 0 30px rgba(255,34,51,0.19);
  transition:background 0.18s, color 0.13s;
  display:none;
}
#screenControlButton {display:block;}
#screenControlButton.active {background:rgba(255,34,51,0.19); color:white;}
#screenOkButton, #screenCancelButton {
  left:auto; right:30px; bottom:100px; min-width:54px;
  padding:8px 14px; font-size:1rem; margin:9px 0 0 0;
}
#screenCancelButton {
  right:115px; color:var(--text-dim); border-color:var(--text-dim);
}

/* زر تصغير أزرار الإعدادات */
#settingsSizeToggle {
  font-size:0.9rem; padding:4px 15px; margin-top:6px; border-radius:7px;
  border:1px solid var(--red); background:rgba(255,34,51,0.08); color:var(--red); cursor:pointer;
}

/* باقي التنسيقات كما هي … خذها من النسخة السابقة (قصيرة هنا) */

.main { display:flex; flex:1; overflow:hidden; position:relative; z-index:10; }
.canvas-wrap { flex:1; position:relative; overflow:hidden; cursor:grab; touch-action:none; }
#treeCanvas { width:100%; height:100%; display:block; }
.empty-state {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; pointer-events:none;
  gap:14px; opacity:0.4; transition:opacity 0.8s;
}
.empty-state-arrow {
  position: absolute; right: 90px; top: 62px;
  width: 120px; height:30px;
  pointer-events: none;
  z-index: 22;
  transform: rotate(-18deg);
  display: flex; align-items: center;
}
.empty-state-arrow svg {margin-left:-30px;}
.empty-state-text {
  font-family: var(--mono);
  font-size:1.1rem;
  color: var(--text-dim);
  letter-spacing: 1px;
  display:flex;flex-direction:column;align-items:center;
}
.empty-state-text strong {color:var(--red);}
.empty-state-text .hint-bottom {
  font-size:0.7rem; color:var(--red); margin-top:5px; opacity:0.7;
}

/* ------ العقد ------ */
.node-group {cursor:pointer;}
.node-shape {
  stroke-width:3.2;
  filter:url(#neonNode);
  transition: r 0.23s cubic-bezier(.66,.19,.32,1.17);
}
.node-label {
  fill: var(--text);
  font-family: var(--arab);
  font-size:0.83em;
  font-weight: bold;
  pointer-events:none;
  user-select: none;
  text-anchor: middle;
}

.node-selected .node-shape {stroke: var(--yellow); stroke-width: 6;}
.node-shape.special-size {
  /* يسمح بعقدة مكبرة أو مصغرة جداً */
  stroke-width:5;
  filter: drop-shadow(0 0 28px #ffdd00aa);
  opacity:1 !important;
}

/* --- باقي التنسيقات… ---- */


/* Media & finetune */
@media (max-width:639px) {
  #screenControlButton, #screenOkButton, #screenCancelButton{
    font-size:1.05rem; padding:9px 13px; 
    bottom:22px !important;
  }
  .empty-state-arrow {right:53px;}
}

</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="scanline"></div>
<div class="vignette"></div>

<header>
  <div class="header-left">
    <div class="logo-hex">SYS</div>
    <div class="header-titles">
      <div class="header-title">CYBER INTEL // الشجرة السيبرانية</div>
      <div class="header-sub">رحلتك الرقمية • v4.0</div>
    </div>
  </div>
  <div class="header-right">
    <div class="stat-chips-wrap">
      <div class="stat-chip" id="chipNodes">عقد: 0</div>
      <div class="stat-chip" id="chipDepth">عمق: 0</div>
      <div class="stat-chip" id="chipLinks" style="color:var(--green);border-color:rgba(0,255,136,0.2);">روابط: 0</div>
    </div>
    <div class="status-dot"></div>
    <button class="settings-toggle" id="settingsToggle" title="الإعدادات" onclick="toggleSettingsPanel()">
      <span class="gear-icon">⚙</span>
      <div class="settings-badge" id="settingsBadge"></div>
    </button>
  </div>
</header>

<!-- شاشة الرسم الرئيسية -->
<div class="main">
  <div class="canvas-wrap" id="canvasWrap">
    <svg id="treeCanvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="neonNode" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g id="linksG"></g>
      <g id="nodesG"></g>
    </svg>
    <!-- Empty state التفاعلي -->
    <div class="empty-state" id="emptyState">
      <div class="empty-state-text">
        <span>اضغط على زر</span>
      </div>
      <div class="empty-state-arrow" id="emptyArrow">
        <svg width="90" height="30"><path d="M5 25 Q45 0 90 20" stroke="#ff2233" stroke-width="4" fill="none" marker-end="url(#arr)"/><defs><marker id="arr" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0 0, 7 3.5, 0 7" fill="#ff2233"/></marker></defs></svg>
        <span style="color:var(--red);font-size:1.0rem;margin-left:-5px;">الإعدادات</span>
      </div>
      <div class="empty-state-text">
        <span>لتبدا رحلتك السيبرانية</span>
        <span class="hint-bottom">ابدأ بإضافة عقدة أو استورد التكوين</span>
      </div>
    </div>
    <!-- زر التحكم الجديد -->
    <button id="screenControlButton" onclick="openScreenControl()">التحكم بالشاشة</button>
    <button id="screenOkButton" onclick="confirmScreenControl()">✔️</button>
    <button id="screenCancelButton" onclick="cancelScreenControl()">✖️</button>
  </div>
</div>

<!-- شريط خاص لتصغير أزرار الإعدادات -->
<button id="settingsSizeToggle" onclick="toggleSettingsButtonsSize()" style="position:fixed;top:57px;right:8px;z-index:200;">تصغير أزرار الإعدادات</button>

<!-- إعدادت وحجم العقد -->
<div class="settings-panel" id="settingsPanel">
  <div class="panel-header">
    <div class="panel-title">// الإعدادات</div>
    <button class="panel-close" onclick="closeSettingsPanel()">✕</button>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">// الإجراءات</div>
    <button class="btn btn-add" onclick="openAdd();closeSettingsPanel()">⊕ إضافة عقدة</button>
    <button class="btn btn-edit" onclick="openEdit();closeSettingsPanel()">✎ تعديل العقدة</button>
    <button class="btn btn-del" onclick="deleteSelected();closeSettingsPanel()">⊗ حذف العقدة</button>
    <button class="btn btn-secondary" onclick="fitAllNodeSize(1.2)">تكبير كل العقد</button>
    <button class="btn btn-secondary" onclick="fitAllNodeSize(0.8)">تصغير كل العقد</button>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">// نوع العقدة</div>
    <div class="type-grid" id="typeGrid">
      <button class="type-btn" data-type="هدف">أحمر</button>
      <button class="type-btn" data-type="مشتبه">برتقالي</button>
      <button class="type-btn" data-type="IP">سماوي</button>
      <button class="type-btn" data-type="دومين">بنفسجي</button>
      <button class="type-btn" data-type="ملف">أصفر</button>
      <button class="type-btn" data-type="رابط">أخضر</button>
      <button class="type-btn" data-type="شخص">زهري</button>
      <button class="type-btn" data-type="منظمة">أزرق</button>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">// الحجم</div>
    <label>حجم العقدة المختارة</label>
    <input type="range" min="0.5" max="2" step="0.05" id="selectedSizeSlider" value="1" oninput="changeSelectedNodeSize(this.value)">
    <span id="selectedSizeValue">1</span>
  </div>
</div>

<!-- نافذة إضافة/تعديل عقدة -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">// إضافة عقدة</div>
    <div class="modal-field">
      <label>// اسم العقدة <span id="nodeNameWarning" style="color:red; font-size:0.7em;"></span></label>
      <input type="text" id="inpName" placeholder="أد��ل الاسم..." maxlength="40" autocomplete="off"/>
    </div>
    <div class="modal-field">
      <label>// النوع</label>
      <select id="inpType">
        <option value="هدف">أحمر</option>
        <option value="مشتبه">برتقالي</option>
        <option value="IP">سماوي</option>
        <option value="دومين">بنفسجي</option>
        <option value="ملف">أصفر</option>
        <option value="رابط">أخضر</option>
        <option value="شخص">زهري</option>
        <option value="منظمة">أزرق</option>
      </select>
    </div>
    <div class="modal-field">
      <label>// ملاحظات</label>
      <textarea id="inpNote" placeholder="ملاحظات..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="mbtn mbtn-confirm" onclick="confirmModal()">تأكيد ▶</button>
      <button class="mbtn mbtn-cancel" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<!-- اختصار: زر لل preview صح وخطأ -->
<div style="position:fixed;left:15px;bottom:32px;z-index:400;display:flex;gap:12px;">
  <button onclick="alert('جميل!👍')" style="font-size:1.4rem;background:#0f52; color:var(--green); border:2px solid var(--green); border-radius:7px; width:44px; height:44px; cursor:pointer;">✔️</button>
  <button onclick="alert('تحتاج تعديلات 😔')" style="font-size:1.4rem;background:#4118; color:var(--red); border:2px solid var(--red); border-radius:7px;width:44px;height:44px; cursor:pointer;">❌</button>
</div>

<script>
// خريطة الأنواع وألوانها
const nodeTypeColors = {
  'هدف':     'var(--red)',
  'مشتبه':   'var(--orange)',
  'IP':      'var(--cyan)',
  'دومين':   'var(--purple)',
  'ملف':     'var(--yellow)',
  'رابط':    'var(--green)',
  'شخص':     'var(--pink)',
  'منظمة':   'var(--blue)'
};

let nodes = [];            // جميع العقد
let links = [];            // الروابط (ليس مطلوب الآن)
let nodeSizeFactor = 1;    // حجم جميع العقد
let panX = 0, panY = 0;    // تحريك الشاشة
let zoom  = 1;             // تقريب/تبعيد كامل
let selectedId = null;     // العقدة المختارة
let dragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0, justDragged = false;

const LS_KEY = "cyber_tree_v4_ui";
function saveLocalData() {
  localStorage.setItem(LS_KEY, JSON.stringify({
    nodeSizeFactor, panX, panY, zoom, nodes
  }));
}
function loadLocalData() {
  let raw = localStorage.getItem(LS_KEY);
  if(raw) {
    try {
      let d = JSON.parse(raw);
      nodeSizeFactor = d.nodeSizeFactor || 1;
      panX = d.panX || 0; panY = d.panY || 0;
      zoom = d.zoom || 1;
      nodes = d.nodes || [];
    } catch {}
  }
}

// رسم الخلفية
(function(){
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  resize(); window.addEventListener('resize',resize);
  function frame(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle='#040407'; ctx.fillRect(0,0,c.width,c.height);
    requestAnimationFrame(frame);
  }
  frame();
})();

// ------ رسم الشجرة ------
function drawTree() {
  const svg = document.getElementById("treeCanvas");
  const group = document.getElementById("nodesG");
  group.innerHTML = "";
  let nodeRadius = 33 * nodeSizeFactor;
  nodes.forEach(node=>{
    let cx = (node.x||400) * zoom+panX, cy=(node.y||250)*zoom+panY;
    let color = nodeTypeColors[node.type]||'#ccc';
    let nsize = (node.sizeFactor||1)*nodeRadius;
    group.innerHTML += `
      <g class="node-group${selectedId===node.id?' node-selected':''}"
         data-id="${node.id}" transform="translate(${cx},${cy})">
        <circle class="node-shape${node.sizeFactor?' special-size':''}"
           r="${nsize}" fill="var(--bg)" stroke="${color}" style="filter:drop-shadow(0 0 18px ${color});opacity:0.92"/>
        ${ node.type!=='رابط'||(node.label && node.label.trim()) ? 
          `<text class="node-label" y="7" fill="var(--text)">${node.label||''}</text>` : '' }
      </g>
    `;
  });
}
drawTree();

// -------- اضغط على العقدة/الفراغ -----------
document.getElementById("treeCanvas").addEventListener("mousedown",function(e){
  let {left,top} = this.getBoundingClientRect();
  let mx = (e.clientX-left-panX)/zoom, my = (e.clientY-top-panY)/zoom;
  let found=false;
  for(let i=nodes.length-1;i>=0;i--){
    let n=nodes[i], cx=n.x||400, cy=n.y||250, r=33*nodeSizeFactor*(n.sizeFactor||1);
    let dx = mx-cx, dy = my-cy;
    if(Math.sqrt(dx*dx+dy*dy)<r){
      //توسيع/طي أو فتح الرابط فقط لا غير
      selectedId = n.id;
      updateSelectedUI();
      if(n.type==="رابط" && n.link){
        window.open(n.link, '_blank');
      }
      found=true;
      break;
    }
  }
  if(!found){selectedId=null; updateSelectedUI();}
  drawTree();
});

// --------- السحب والتحريك اللا نهائي -----------
document.getElementById("treeCanvas").addEventListener("mousedown",function(e){
  dragging=true; justDragged=false;
  dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = panX; panStartY = panY;
});
document.addEventListener("mousemove",function(e){
  if(dragging){
    justDragged=true;
    panX = panStartX + (e.clientX-dragStartX);
    panY = panStartY + (e.clientY-dragStartY);
    drawTree();
  }
});
document.addEventListener("mouseup",()=>{ dragging=false; if(justDragged) saveLocalData(); });

// -------- تكبير/تصغير جميع العقد ----------
function fitAllNodeSize(f){
  nodeSizeFactor = Math.max(0.3,Math.min(2,nodeSizeFactor*f));
  drawTree(); saveLocalData();
}

// -------- تخصيص حجم العقدة المختارة -----------
function changeSelectedNodeSize(val){
  let v = Number(val); document.getElementById("selectedSizeValue").textContent=Number(val).toFixed(2);
  let node = nodes.find(n=>n.id===selectedId);
  if(node){node.sizeFactor=v; drawTree(); saveLocalData();}
}
function updateSelectedUI(){
  let slider=document.getElementById("selectedSizeSlider");
  let node=nodes.find(n=>n.id===selectedId);
  if(node){slider.value=node.sizeFactor||1; document.getElementById("selectedSizeValue").textContent=node.sizeFactor||1;}
  else {slider.value=1; document.getElementById("selectedSizeValue").textContent="1";}
}

// -------- التحكم بالشاشة كأنها صورة + حفظ pan/zoom --------
let screenControlMode=false;
function openScreenControl(){
  screenControlMode=true;
  document.getElementById("canvasWrap").style.cursor='move';
  document.getElementById("screenOkButton").style.display='block';
  document.getElementById("screenCancelButton").style.display='block';
  document.getElementById("screenControlButton").classList.add("active");
  document.body.style.pointerEvents='auto';
  // الآن يكفي السحب/العجلة للوحة كأنها الاستوديو
  document.getElementById("canvasWrap").addEventListener("wheel",zoomHandler,{passive:false});
}
function zoomHandler(e){
  if(!screenControlMode) return;
  e.preventDefault();
  let delta = e.deltaY<0?1.04:0.96;
  zoom = Math.max(0.2, Math.min(4, zoom*delta));
  drawTree();
}
function confirmScreenControl() {
  document.getElementById("canvasWrap").removeEventListener("wheel",zoomHandler);
  screenControlMode=false;
  document.getElementById("screenOkButton").style.display='none';
  document.getElementById("screenCancelButton").style.display='none';
  document.getElementById("screenControlButton").classList.remove("active");
  document.body.style.pointerEvents='';
  saveLocalData();
}
function cancelScreenControl() {
  document.getElementById("canvasWrap").removeEventListener("wheel",zoomHandler);
  screenControlMode=false;
  document.getElementById("screenOkButton").style.display='none';
  document.getElementById("screenCancelButton").style.display='none';
  document.getElementById("screenControlButton").classList.remove("active");
  document.body.style.pointerEvents='';
  loadLocalData();
  drawTree();
}

// ------- تصغير أزرار الإعدادات -------
let settingsSmall = false;
function toggleSettingsButtonsSize() {
  settingsSmall = !settingsSmall;
  let btns = document.querySelectorAll('.settings-toggle, .btn, .btn-add, .btn-edit, .btn-del, .btn-secondary');
  btns.forEach(b => {b.classList.toggle('small', settingsSmall); b.style.fontSize = settingsSmall ? "0.77rem" : ""; b.style.padding = settingsSmall ? "5px 2px" : "";});
  document.getElementById("settingsSizeToggle").textContent = settingsSmall ? "تكبير أزرار الإعدادات" : "تصغير أزرار الإعدادات";
}

// ------ نافذة إضافة/تعديل العقد واسمها ------
let nextId = 1;
function openAdd() {
  selectedId=null;document.getElementById("modalTitle").textContent="// إضافة عقدة";
  document.getElementById("inpName").value="";document.getElementById("inpType").value="هدف";
  document.getElementById("inpNote").value="";
  document.getElementById("overlay").style.display = "flex";
}
function openEdit() {
  let node = nodes.find(n=>n.id===selectedId);
  if(!node) return alert("حدد عقدة");
  document.getElementById("modalTitle").textContent="// تعديل عقدة";
  document.getElementById("inpName").value=node.label||"";
  document.getElementById("inpType").value=node.type||"هدف";
  document.getElementById("inpNote").value=node.note||"";
  document.getElementById("overlay").style.display = "flex";
}
function closeModal(){
  document.getElementById("overlay").style.display = "none";
  document.getElementById("nodeNameWarning").textContent="";
}
function confirmModal(){
  let label = document.getElementById("inpName").value.trim();
  let type = document.getElementById("inpType").value;
  let note = document.getElementById("inpNote").value;
  // عقدة "رابط" فقط التي يسمح أن يكون اسمها فارغ
  if(type!=="رابط" && !label){
    document.getElementById("nodeNameWarning").textContent="يجب تعبئة الاسم";
    return;
  }
  document.getElementById("nodeNameWarning").textContent="";
  if(document.getElementById("modalTitle").textContent.includes("إضافة")){
    nodes.push({id:nextId++,label,type,note,x:440+Math.random()*90,y:260+Math.random()*70,sizeFactor:1});
  } else {
    let node = nodes.find(n=>n.id===selectedId);
    if(node){node.label=label; node.type=type; node.note=note;}
  }
  closeModal();drawTree();saveLocalData();
}

// ----------- عند التحميل ---------
window.onload= function(){
  loadLocalData();
  drawTree();
}
